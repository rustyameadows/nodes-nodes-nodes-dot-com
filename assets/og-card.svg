  <desc id="desc">Social preview image for Nodes Nodes Nodes with screenshot-led product proof and local-first workflow messaging.</desc>
  <defs>
    <clipPath id="shotClip">
      <rect x="648" y="82" width="486" height="364" rx="28"/>
